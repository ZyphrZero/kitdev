[policy]
channel = "stable"
mirror = "ustc"

[tools.node]
version = "24.x"
manager = "fnm"
package_managers = ["npm", "pnpm", "yarn", "bun"]

[tools.npm]
version = "latest"
manager = "npm"

[tools.pnpm]
version = "latest"
manager = "corepack"

[tools.yarn]
version = "stable"
manager = "corepack"

[tools.rustc]
version = "stable"
manager = "rustup"

[tools.cargo]
version = "stable"
manager = "rustup"

[tools.uv]
version = "latest"
manager = "standalone"

[tools.python]
version = "latest"
manager = "uv"

[tools.wrangler]
version = "latest"
manager = "npm"

[npm]
global_packages = ["wrangler"]

[platform.macos.policy]
platform = "macos-arm64"

[platform.macos.tools.fnm]
version = "latest"
manager = "brew"

[platform.macos.tools.bun]
version = "latest"
manager = "brew"

[platform.macos.tools.deno]
version = "latest"
manager = "brew"

[platform.macos.tools.go]
version = "1.26.2"
manager = "official"
source = "official"
install_dir = "~/.local/opt/go/current"

[platform.macos.tools.poetry]
version = "latest"
manager = "brew"

[platform.macos.tools.ruby]
version = "latest"
manager = "brew"

[platform.macos.tools.cli]
manager = "brew"
packages = ["gh", "tmux"]

[platform.macos.homebrew]
mirror = "ustc"
packages = ["fnm", "bun", "deno", "python", "poetry", "ruby", "gh", "tmux"]

[platform.linux.policy]
platform = "linux-x86_64"

[platform.linux.tools.fnm]
version = "latest"
manager = "standalone"

[platform.linux.tools.bun]
version = "latest"
manager = "standalone"

[platform.linux.tools.deno]
version = "latest"
manager = "standalone"

[platform.linux.tools.go]
version = "stable"
manager = "official"
source = "official"
install_dir = "~/.local/opt/go/current"

[platform.linux.tools.poetry]
version = "latest"
manager = "official"

[platform.linux.tools.cli]
packages = ["gh", "tmux"]

[platform.windows.policy]
platform = "windows-x86_64"

[platform.windows.tools.fnm]
version = "latest"
manager = "winget"

[platform.windows.tools.bun]
version = "latest"
manager = "winget"

[platform.windows.tools.deno]
version = "latest"
manager = "winget"

[platform.windows.tools.go]
version = "stable"
manager = "winget"
source = "winget"

[platform.windows.tools.poetry]
version = "latest"
manager = "official"

[platform.windows.tools.cli]
manager = "winget"
packages = ["GitHub.cli", "Microsoft.WindowsTerminal"]
