[policy]
channel = "stable"
mirror = "ustc"
platform = "macos-arm64"

[tools.fnm]
version = "latest"
manager = "brew"

[tools.node]
version = "24.x"
manager = "fnm"
package_managers = ["npm", "pnpm", "yarn", "bun"]

[tools.npm]
version = "latest"
manager = "npm"

[tools.pnpm]
version = "latest"
manager = "corepack"

[tools.yarn]
version = "stable"
manager = "corepack"

[tools.bun]
version = "latest"
manager = "brew"

[tools.deno]
version = "latest"
manager = "brew"

[tools.go]
version = "1.26.2"
manager = "official"
source = "official"
install_dir = "~/.local/opt/go/current"

[tools.rustc]
version = "stable"
manager = "rustup"

[tools.cargo]
version = "stable"
manager = "rustup"

[tools.uv]
version = "latest"
manager = "standalone"

[tools.python]
version = "latest"
manager = "brew"

[tools.poetry]
version = "latest"
manager = "brew"

[tools.ruby]
version = "latest"
manager = "brew"

[tools.wrangler]
version = "latest"
manager = "npm"

[tools.cli]
manager = "brew"
packages = ["gh", "tmux"]

[homebrew]
mirror = "ustc"
packages = ["fnm", "bun", "deno", "python", "poetry", "ruby", "gh", "tmux"]

[npm]
global_packages = ["wrangler"]
