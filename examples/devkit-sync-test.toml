# Validation config for exercising `devkit sync`.
# It keeps the main toolchain policy and adds one lightweight missing package
# so `sync --dry-run` and `sync --apply` both have a real install path to test.

[policy]
channel = "stable"
mirror = "ustc"
platform = "macos-arm64"

[tools.fnm]
version = "latest"
manager = "brew"

[tools.node]
version = "24.x"
manager = "fnm"
package_managers = ["npm", "pnpm", "bun"]

[tools.npm]
version = "latest"
manager = "npm"

[tools.pnpm]
version = "latest"
manager = "corepack"

[tools.bun]
version = "latest"
manager = "brew"

[tools.go]
version = "1.26.2"
manager = "official"
source = "official"
install_dir = "~/.local/opt/go/current"

[tools.rustc]
version = "stable"
manager = "rustup"

[tools.cargo]
version = "stable"
manager = "rustup"

[tools.uv]
version = "latest"
manager = "standalone"

[tools.wrangler]
version = "latest"
manager = "npm"

[tools.cli]
manager = "brew"
packages = ["gh", "tmux", "yq"]

[homebrew]
mirror = "ustc"
packages = ["fnm", "bun", "gh", "tmux", "yq"]

[npm]
global_packages = ["wrangler"]
